<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkItDown Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #1a1a2e;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 0.95rem; }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 820px;
    }

    .drop-zone {
      border: 2px dashed #c0c0d0;
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #4f6ef7;
      background: #f0f3ff;
    }
    .drop-zone svg { margin-bottom: 12px; opacity: 0.5; }
    .drop-zone p { color: #555; }
    .drop-zone strong { color: #4f6ef7; }

    #file-input { display: none; }

    .selected-file {
      font-size: 0.85rem;
      color: #4f6ef7;
      margin-bottom: 12px;
      min-height: 20px;
    }

    button.convert-btn {
      background: #4f6ef7;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button.convert-btn:hover { background: #3a56d4; }
    button.convert-btn:disabled { background: #aab4e8; cursor: default; }

    .error-msg {
      color: #d9534f;
      margin-top: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .result-section { margin-top: 28px; display: none; }
    .result-section h2 { font-size: 1.1rem; margin-bottom: 12px; color: #333; }

    .result-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .result-actions button {
      padding: 8px 18px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .result-actions button:hover { background: #f0f3ff; border-color: #4f6ef7; color: #4f6ef7; }

    textarea#output {
      width: 100%;
      height: 400px;
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      resize: vertical;
      background: #fafafa;
      color: #222;
      line-height: 1.5;
    }

    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 3px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>MarkItDown Converter</h1>
  <p class="subtitle">Convert PDF, Word, Excel, PowerPoint, and more to clean Markdown</p>

  <div class="card">
    <div class="drop-zone" id="drop-zone">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4f6ef7" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Drag &amp; drop a file here, or <strong>click to browse</strong></p>
      <p style="font-size:0.8rem;margin-top:6px;color:#999;">
        PDF · DOCX · PPTX · XLSX · HTML · CSV · JSON · XML · TXT · JPG · PNG
      </p>
    </div>
    <input type="file" id="file-input" accept=".pdf,.docx,.doc,.pptx,.ppt,.xlsx,.xls,.html,.htm,.csv,.json,.xml,.txt,.jpg,.jpeg,.png" />

    <div class="selected-file" id="selected-file"></div>

    <button class="convert-btn" id="convert-btn" disabled>
      <span id="btn-label">Convert to Markdown</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error-msg" id="error-msg"></div>

    <div class="result-section" id="result-section">
      <h2>Markdown Output</h2>
      <div class="result-actions">
        <button id="copy-btn">Copy to Clipboard</button>
        <button id="download-btn">Download .md</button>
      </div>
      <textarea id="output" readonly></textarea>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");
    const selectedFile = document.getElementById("selected-file");
    const convertBtn = document.getElementById("convert-btn");
    const btnLabel = document.getElementById("btn-label");
    const spinner = document.getElementById("spinner");
    const errorMsg = document.getElementById("error-msg");
    const resultSection = document.getElementById("result-section");
    const output = document.getElementById("output");
    const copyBtn = document.getElementById("copy-btn");
    const downloadBtn = document.getElementById("download-btn");

    let currentFile = null;
    let currentFilename = "";

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => { if (fileInput.files.length) setFile(fileInput.files[0]); });

    function setFile(file) {
      currentFile = file;
      currentFilename = file.name;
      selectedFile.textContent = `Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      convertBtn.disabled = false;
      errorMsg.style.display = "none";
      resultSection.style.display = "none";
    }

    convertBtn.addEventListener("click", async () => {
      if (!currentFile) return;
      btnLabel.style.display = "none";
      spinner.style.display = "block";
      convertBtn.disabled = true;
      errorMsg.style.display = "none";

      const formData = new FormData();
      formData.append("file", currentFile);

      try {
        const resp = await fetch("/convert", { method: "POST", body: formData });
        const data = await resp.json();
        if (!resp.ok || data.error) {
          showError(data.error || "Conversion failed");
        } else {
          output.value = data.markdown;
          resultSection.style.display = "block";
        }
      } catch (e) {
        showError("Network error: " + e.message);
      } finally {
        btnLabel.style.display = "inline";
        spinner.style.display = "none";
        convertBtn.disabled = false;
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = "block";
    }

    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(output.value).then(() => {
        copyBtn.textContent = "Copied!";
        setTimeout(() => copyBtn.textContent = "Copy to Clipboard", 2000);
      });
    });

    downloadBtn.addEventListener("click", () => {
      const blob = new Blob([output.value], { type: "text/markdown" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = currentFilename.replace(/\.[^.]+$/, "") + ".md";
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
